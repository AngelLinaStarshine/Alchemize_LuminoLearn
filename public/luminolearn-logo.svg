  <path d="M 42 82 Q 32 72 38 62" stroke="#ea580c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 78 82 Q 88 72 82 62" stroke="#ea580c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Stars -->
  <polygon points="48,52 50,56 54,56 51,59 52,63 48,61 44,63 45,59 42,56 46,56" fill="#7c3aed"/>
  <polygon points="72,52 74,56 78,56 75,59 76,63 72,61 68,63 69,59 66,56 70,56" fill="#7c3aed"/>
